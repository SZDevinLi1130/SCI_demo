CONFIG_NCS_SAMPLES_DEFAULTS=y

CONFIG_CONSOLE=y
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_HANDLER=y
CONFIG_CONSOLE_GETCHAR=y

CONFIG_BT_DEVICE_NAME="Nordic_SCI"
CONFIG_BT=y
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_MAX_CONN=2
CONFIG_BT_BONDABLE=n

# Shorter Connection Intervals dependencies
CONFIG_BT_LE_EXTENDED_FEAT_SET=y
CONFIG_BT_SUBRATING=y

CONFIG_BT_FRAME_SPACE_UPDATE=y
CONFIG_BT_SHORTER_CONNECTION_INTERVALS=y
CONFIG_BT_CTLR_LE_FLUSHABLE_ACL_DATA=y
CONFIG_BT_CTLR_SDC_QOS_CONN_EVENT_REPORT=y
CONFIG_BT_RADIO_NOTIFICATION_CONN_CB=y
CONFIG_BT_CTLR_SDC_CONN_ANCHOR_POINT_REPORT=y

# Cap ACL PDU length so encrypted 1M packet pairs remain schedulable within <=1 ms SCI.
CONFIG_BT_CTLR_DATA_LENGTH_MAX=35

# Leave margin inside the 1 ms ceiling so the controller can accept SCI on 1M PHY.
CONFIG_BT_CTLR_SDC_MAX_CONN_EVENT_LEN_DEFAULT=875
CONFIG_BT_CTLR_SDC_CENTRAL_ACL_EVENT_SPACING_DEFAULT=875
CONFIG_BT_CTLR_SDC_CONN_EVENT_EXTEND_DEFAULT=n

CONFIG_BT_SCAN=y
CONFIG_BT_SCAN_FILTER_ENABLE=y
CONFIG_BT_SCAN_UUID_CNT=1

CONFIG_BT_LATENCY=y
CONFIG_BT_LATENCY_CLIENT=y

CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_DM=y

CONFIG_BT_GAP_PERIPHERAL_PREF_PARAMS=n
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n
CONFIG_BT_USER_PHY_UPDATE=y
CONFIG_BT_HCI_ERR_TO_STR=y
CONFIG_BT_HCI_VS_EVT_USER=y

CONFIG_GPIO=y
CONFIG_NRFX_GPPI=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y
